# ===============================
# PERFIL DE PRODUCCION
# ===============================

# Feature Flags - Produccion (solo lo esencial)
app.features.cache.enabled=true
app.features.resilience.enabled=true
app.features.metrics.enabled=true

# Rate Limiting - Mas agresivo en produccion
app.rate-limit.requests-per-hour=4000
app.rate-limit.burst-size=50
app.rate-limit.enable-backoff=true
app.rate-limit.max-retries=3

# Cache - TTL mas largo para produccion
app.cache.ttl.minutes=60
app.cache.max-size=5000
app.cache.enable-stats=true

# Logging - Minimal para produccion
logging.level.com.drhdn.ghvis=WARN
logging.file.name=/var/log/gitstellarprism/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# Actuator - Solo endpoints esenciales
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never 