# ===============================
# PERFIL DE PRODUCCIÓN
# ===============================

# Logging minimal para producción
logging.level.com.drhdn.ghvis=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.reactive.function.client=WARN
logging.level.org.springframework.security.oauth2=INFO

# Configuración de base de datos para producción
# Cambiar por base de datos persistente en producción real
spring.datasource.url=jdbc:h2:file:./data/ghvis-prod;AUTO_SERVER=TRUE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# H2 Console deshabilitada en producción
spring.h2.console.enabled=false

# OAuth2 configuración para producción
spring.security.oauth2.client.registration.github.redirect-uri=${APP_BASE_URL:https://your-domain.com}/login/oauth2/code/github

# WebClient timeouts optimizados para producción
app.webclient.timeout.connection=5000
app.webclient.timeout.read=15000
app.webclient.timeout.write=15000
app.webclient.max-memory-size=1048576

# Cache habilitado para producción
spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# CORS restrictivo para producción
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://your-domain.com}
app.cors.allowed-methods=GET,POST,PUT,DELETE
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With

# Actuator endpoints limitados en producción
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.configprops.show-values=never

# Security estricta para producción
app.security.require-ssl=true
app.security.session-timeout=3600
app.security.session-cookie.secure=true
app.security.session-cookie.http-only=true
app.security.session-cookie.same-site=strict

# Rate limiting para APIs
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100
app.rate-limit.requests-per-hour=1000

# Connection pooling optimizado para producción
app.connection-pool.max-size=20
app.connection-pool.min-size=5
app.connection-pool.max-idle-time=30000

# Configuración de caché
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s

# Compression para responses
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml

# SSL/TLS configuración (cuando se use HTTPS)
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE_PATH:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# Monitoring y alertas
app.monitoring.enabled=true
app.monitoring.slow-request-threshold=5000
app.monitoring.error-rate-threshold=0.05 