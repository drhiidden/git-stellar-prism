# ===============================
# PERFIL DE DESARROLLO
# ===============================

# Configuración de logging optimizada para desarrollo (sin ruido excesivo)
logging.level.com.drhdn.ghvis=DEBUG
# Solo OAuth2 y autenticación importantes
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.web.server.authentication=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
# Silenciar logs muy verbosos que ensucian la consola
logging.level.org.springframework.security.web.server.util.matcher=WARN
logging.level.org.springframework.security.web.server.authorization=INFO

# Mostrar SQL queries en desarrollo
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console habilitada para desarrollo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración OAuth2 para desarrollo local
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github

# WebClient timeouts más largos para debugging
app.webclient.timeout.connection=30000
app.webclient.timeout.read=60000
app.webclient.timeout.write=60000

# Deshabilitar cache para desarrollo
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# Configuración de CORS permisiva para desarrollo
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*

# Configuración de actuator más abierta en desarrollo
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.configprops.show-values=always

# Configuración de security para desarrollo
app.security.require-ssl=false
app.security.session-timeout=86400

# Mock data para desarrollo (opcional)
app.development.mock-data.enabled=false
app.development.mock-data.repositories=10
app.development.mock-data.commits=100 