# ===============================
# PERFIL DE DESARROLLO
# ===============================

# Feature Flags - Desarrollo (solo lo esencial)
app.features.cache.enabled=true
app.features.resilience.enabled=true
app.features.metrics.enabled=true

# Rate Limiting - Mas conservador en desarrollo
app.rate-limit.requests-per-hour=1000
app.rate-limit.burst-size=10
app.rate-limit.enable-backoff=true
app.rate-limit.max-retries=2

# Cache - TTL mas corto para desarrollo
app.cache.ttl.minutes=15
app.cache.max-size=500
app.cache.enable-stats=true

# Logging - Detallado para ver llamadas a GitHub
logging.level.com.drhdn.ghvis=DEBUG
logging.level.com.drhdn.ghvis.infrastructure.adapter.outbound.external=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG

# Actuator - Para monitorear rate limits y cache
management.endpoints.web.exposure.include=health,info,metrics,cache,rate-limit
management.endpoint.health.show-details=always 