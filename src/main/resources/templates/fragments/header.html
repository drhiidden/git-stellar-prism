<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Este fragmento contiene solo las definiciones, no se renderiza completo -->
</head>
<body>

<!-- Fragmento: Header/Navegación Principal -->
<nav th:fragment="main-nav" class="navbar navbar-expand-lg sticky-top modern-navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="fas fa-cube me-2"></i>
            <span>GitStellarPrism</span>
        </a>
        
        <div class="d-flex align-items-center gap-3">
            <!-- Breadcrumb dinámico (solo en páginas internas) -->
            <nav th:if="${showBreadcrumb}" aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item">
                        <a href="/dashboard" class="text-light">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li th:if="${breadcrumbTitle}" class="breadcrumb-item active text-light" aria-current="page">
                        <i th:class="${breadcrumbIcon ?: 'fas fa-file'} + ' me-1'"></i>
                        <span th:text="${breadcrumbTitle}">Página</span>
                    </li>
                </ol>
            </nav>
            
            <!-- Estado de conexión (solo en análisis) -->
            <div th:if="${showRealtimeStatus}" id="realtime-status" class="status-indicator">
                <i class="fas fa-circle pulse"></i>
                <span>Verificando conexión...</span>
            </div>
            
            <!-- Usuario autenticado -->
            <div class="dropdown" th:if="${isAuthenticated}">
                <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                    <img id="userAvatar" src="" alt="Avatar" class="rounded-circle me-2" width="32" height="32" style="display: none;">
                    <i class="fas fa-user-circle me-2" id="defaultAvatar"></i>
                    <span id="userName">Usuario</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a></li>
                    <li><a class="dropdown-item" href="/api/user/info" target="_blank">
                        <i class="fas fa-user me-2"></i> Mi Perfil
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión
                    </a></li>
                </ul>
            </div>
            
            <!-- Login para usuarios no autenticados -->
            <div th:unless="${isAuthenticated}">
                <a class="btn btn-primary" href="/oauth2/authorization/github">
                    <i class="fab fa-github me-2"></i>
                    <span>Iniciar Sesión</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Fragmento: Head común -->
<head th:fragment="common-head (title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - GitStellarPrism'">GitStellarPrism</title>
    
    <!-- Preconnect para optimizar carga -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<!-- Fragmento: Scripts base -->
<div th:fragment="base-scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Sistema de Componentes -->
    <script th:src="@{/js/core/ComponentSystem.js}"></script>
    <script th:src="@{/js/services/ApiService.js}"></script>
    
    <!-- Componentes -->
    <script th:src="@{/js/components/HeaderComponent.js}"></script>
    <script th:src="@{/js/components/NotificationComponent.js}"></script>
    <script th:src="@{/js/components/DashboardComponent.js}"></script>
    
    <!-- Aplicación principal -->
    <script th:src="@{/js/app.js}"></script>
</div>

<!-- Fragmento: Scripts de análisis -->
<div th:fragment="analysis-scripts">
    <!-- D3.js para Timeline -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    
    <!-- Three.js y dependencias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Scripts de la aplicación -->
    <script th:src="@{/js/eventHandler.js}"></script>
    <script th:src="@{/js/timeline.js}"></script>
    <script th:src="@{/js/uiController.js}"></script>
    <script th:src="@{/js/visualization.js}"></script>
</div>

<!-- Fragmento: Scripts de autenticación -->
<div th:fragment="auth-scripts">
    <script th:inline="javascript">
        // Configuración inicial desde el servidor
        document.addEventListener('DOMContentLoaded', function() {
            // Variables del servidor para el frontend (usando variables del controlador)
            const serverConfig = {
                isAuthenticated: /*[[${isAuthenticated != null ? isAuthenticated : false}]]*/ false,
                userName: null, // Se obtendrá via API para evitar problemas con Principal.name
                userAvatar: null, // Se obtendrá via API
                showBreadcrumb: /*[[${showBreadcrumb != null ? showBreadcrumb : false}]]*/ false,
                breadcrumbTitle: /*[[${breadcrumbTitle != null ? breadcrumbTitle : ''}]]*/ '',
                breadcrumbIcon: /*[[${breadcrumbIcon != null ? breadcrumbIcon : 'fas fa-file'}]]*/ 'fas fa-file',
                showRealtimeStatus: /*[[${showRealtimeStatus != null ? showRealtimeStatus : false}]]*/ false
            };
            
            console.log('🔐 Configuración de servidor:', serverConfig);
            
            // Pasar configuración al sistema de componentes
            if (window.GitStellarPrism) {
                // NOTA: No establecemos user aquí porque Principal.name puede devolver el ID
                // en lugar del username. En su lugar, dejamos que HeaderComponent haga 
                // una llamada a /api/user/info para obtener la información correcta.
                window.GitStellarPrism.setState({
                    user: null // Se cargará via API
                });
                
                // Actualizar header si existe
                const headerComponent = window.GitStellarPrism.getComponent('header');
                if (headerComponent) {
                    headerComponent.updateOptions({
                        showBreadcrumb: serverConfig.showBreadcrumb,
                        breadcrumbTitle: serverConfig.breadcrumbTitle,
                        breadcrumbIcon: serverConfig.breadcrumbIcon,
                        showRealtimeStatus: serverConfig.showRealtimeStatus
                    });
                }
            }
            
            // Timeout de seguridad para inicializar componentes si no se han cargado
            setTimeout(() => {
                if (!window.GitStellarPrism) {
                    console.warn('⚠️ Sistema de componentes no disponible, usando fallback');
                    // Aquí podríamos tener un fallback básico
                }
            }, 3000);
        });
    </script>
</div>

<!-- Fragmento: Toast notifications -->
<div th:fragment="toast-notifications">
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="notification-toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i class="fas fa-bell text-primary me-2"></i>
                <strong class="me-auto">GitStellarPrism</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body">
                <!-- Mensaje dinámico -->
            </div>
        </div>
    </div>
</div>

</body>
</html>
