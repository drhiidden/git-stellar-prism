<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Visualizer</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- Three.js para visualizaciones 3D -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    
    <!-- D3.js para visualizaciones basadas en datos -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">GitHub Visualizer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnAnalisisTecnologias">Análisis de Tecnologías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnGenerarResumen">Generar Resumen</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card mb-4">
                    <div class="card-header">
                        <h2>Visualizador de Repositorios GitHub</h2>
                    </div>
                    <div class="card-body">
                        <form id="repoForm" class="mb-4">
                            <div class="input-group">
                                <input type="text" class="form-control" id="repoUrl" 
                                       placeholder="Ingrese URL del repositorio (ej: usuario/repositorio)" required>
                                <button type="submit" class="btn btn-primary">Visualizar</button>
                            </div>
                        </form>
                        
                        <div id="loadingIndicator" class="text-center d-none">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                            <p>Cargando datos del repositorio...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3>Visualización</h3>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-secondary" id="btnZoomIn">
                                <i class="bi bi-zoom-in"></i> Zoom +
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="btnZoomOut">
                                <i class="bi bi-zoom-out"></i> Zoom -
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="btnReset">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="visualization-container" class="visualization-container">
                            <!-- Aquí se renderizará la visualización -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h3>Línea de Tiempo</h3>
                    </div>
                    <div class="card-body">
                        <div id="timeline-container" class="timeline-container">
                            <!-- Aquí se renderizará la línea de tiempo -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h3>Información</h3>
                    </div>
                    <div class="card-body">
                        <div id="info-panel">
                            <div class="text-center text-muted" id="noInfoMessage">
                                <p>Seleccione un elemento para ver su información</p>
                            </div>
                            <div id="elementInfo" class="d-none">
                                <!-- La información del elemento seleccionado se mostrará aquí -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <h3>Filtros</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="authorFilter" class="form-label">Autor</label>
                            <select class="form-select" id="authorFilter">
                                <option value="">Todos</option>
                                <!-- Se llenarán dinámicamente -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="branchFilter" class="form-label">Rama</label>
                            <select class="form-select" id="branchFilter">
                                <option value="">Todas</option>
                                <!-- Se llenarán dinámicamente -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="eventTypeFilter" class="form-label">Tipo de Evento</label>
                            <select class="form-select" id="eventTypeFilter">
                                <option value="">Todos</option>
                                <option value="commit">Commits</option>
                                <option value="pr">Pull Requests</option>
                                <option value="issue">Issues</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100" id="applyFilters">Aplicar Filtros</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal para mostrar detalles -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalTitle">Detalles</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailsModalBody">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle con Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Scripts personalizados -->
    <script th:src="@{/js/visualization.js}"></script>
    <script th:src="@{/js/eventHandler.js}"></script>
    <script th:src="@{/js/uiController.js}"></script>
</body>
</html>
