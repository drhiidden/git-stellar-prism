# ===============================
# APLICACIÓN
# ===============================
spring.application.name=gitstellarprism
spring.profiles.active=dev
app.realtime.enabled=true

# ===============================
# CONFIGURACIÓN DE SEGURIDAD
# ===============================
app.security.success-url=/
app.security.logout-success-url=/

# ===============================
# CONFIGURACIÓN WEBHOOK GITHUB
# ===============================
# Secret para validar webhooks de GitHub (opcional en desarrollo)
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}

# ===============================
# OAUTH2 GITHUB CONFIGURATION
# ===============================
# Configuración del cliente GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=repo,user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code

# Configuración del proveedor GitHub OAuth2
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id

# ===============================
# CONFIGURACIÓN WEBCLIENT
# ===============================
# Timeouts en milisegundos
app.webclient.timeout.connection=10000
app.webclient.timeout.read=30000
app.webclient.timeout.write=30000
# Tamaño máximo de memoria para responses (2MB)
app.webclient.max-memory-size=2097152

# ===============================
# BASE DE DATOS H2 (DESARROLLO)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect # No necesario, Hibernate lo detecta automáticamente
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===============================
# CONFIGURACIÓN DE LOGGING
# ===============================
# Configuración por defecto: limpia y sin ruido
logging.level.com.drhdn.ghvis=INFO
logging.level.org.springframework.security.oauth2=INFO
logging.level.org.springframework.security.web.server.authentication=INFO
logging.level.org.springframework.web.reactive.function.client=WARN
# Silenciar completamente logs verbosos e innecesarios
logging.level.org.springframework.security.web.server.util.matcher=ERROR
logging.level.org.springframework.security.web.server.authorization=ERROR
logging.level.org.springframework.security.web.server.csrf=WARN
# Formato de logging limpio
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{20} - %msg%n

# ===============================
# CONFIGURACIÓN DE ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# GITHUB API (LEGACY SUPPORT)
# ===============================
# Token legacy para compatibilidad (opcional)
github.api.token=${GITHUB_API_TOKEN:}

# ===============================
# CONFIGURACIÓN DE CACHE REACTIVO
# ===============================
# TTL del cache en minutos
app.cache.ttl.minutes=30
# Tamaño máximo del cache en memoria
app.cache.max-size=1000
# Habilitar estadísticas del cache
app.cache.enable-stats=true
# Intervalo de limpieza automática en minutos
app.cache.cleanup-interval=5

# ===============================
# CONFIGURACIÓN DE RATE LIMITING
# ===============================
# Límite de peticiones por hora por defecto
app.rate-limit.requests-per-hour=5000
# Tamaño de burst permitido
app.rate-limit.burst-size=100
# Habilitar backoff exponencial
app.rate-limit.enable-backoff=true
# Máximo número de reintentos
app.rate-limit.max-retries=3
# Intervalo de limpieza de rate limits expirados (minutos)
app.rate-limit.cleanup-interval=10